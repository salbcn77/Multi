<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Multi</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Multi">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#6366f1">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <header class="game-header" id="gameHeader" style="display: none;">
            <div class="player-info">
                <span class="player-avatar" id="headerAvatar"></span>
                <span class="player-name" id="headerName"></span>
            </div>
            <div class="header-controls">
                <button id="themeToggle" class="theme-toggle" aria-label="Cambiar tema"></button>
                <div class="timer" id="timer">
                    <span class="timer-icon">&#9200;</span>
                    <span id="timeDisplay">00:00</span>
                </div>
            </div>
        </header>

        <main>
            <section id="configScreen" class="screen active">
                <h1 id="configTitle"></h1>

                <div class="subtitle" id="configSubtitle">de Multiplicar</div>

                <div class="config-section config-row">
                    <button id="themeToggleConfig" class="theme-toggle-btn">
                        <span id="themeIcon">&#9790;</span>
                        <span id="themeLabel">Tema Oscuro</span>
                    </button>
                </div>

                <div class="config-section">
                    <label for="playerName">Tu nombre:</label>
                    <input type="text" id="playerName" maxlength="15" placeholder="Escribe tu nombre" autocomplete="off">
                </div>

                <div class="config-section">
                    <label>Elige tu avatar:</label>
                    <div class="avatar-grid" id="avatarGrid"></div>
                </div>

                <div class="config-section">
                    <label for="difficulty">Dificultad:</label>
                    <div class="difficulty-selector" id="difficultySelector">
                        <button class="diff-btn" data-diff="easy">F&#225;cil <small>(×2 a ×5)</small></button>
                        <button class="diff-btn" data-diff="normal">Normal <small>(×2 a ×7)</small></button>
                        <button class="diff-btn selected" data-diff="hard">Dif&#237;cil <small>(×2 a ×9)</small></button>
                    </div>
                </div>

                <div class="config-section">
                    <label>Pr&#225;ctica enfocada (opcional):</label>
                    <div class="practice-grid" id="practiceGrid"></div>
                    <button id="clearPracticeBtn" class="btn-clear-practice" style="display: none;">Limpiar selecci&#243;n</button>
                </div>

                <div class="config-section">
                    <label for="numQuestions">N&#250;mero de preguntas: <strong id="questionsValue">20</strong></label>
                    <input type="range" id="numQuestions" min="1" max="100" value="20">
                </div>

                <div class="config-section">
                    <label for="timeMinutes">Tiempo (minutos): <strong id="timeValue">5</strong></label>
                    <input type="range" id="timeMinutes" min="1" max="60" value="5">
                </div>

                <button id="startBtn" class="btn btn-primary">Jugar</button>
                <button id="viewLeaderboardBtn" class="btn btn-secondary">Ver Marcadores</button>
            </section>

            <section id="gameScreen" class="screen">
                <div id="scoreTracker" style="display: none;">
                    <span id="trackerCorrect">0</span>
                    <span class="tracker-sep">/</span>
                    <span id="trackerWrong">0</span>
                </div>
                <div id="questionsContainer"></div>
                <div class="game-actions">
                    <button id="skipBtn" class="btn btn-skip">Saltar &#8594;</button>
                    <button id="correctBtn" class="btn btn-primary">Corregir</button>
                </div>
            </section>

            <section id="resultsScreen" class="screen">
                <h2>Resultados</h2>
                <div class="results-summary">
                    <div class="result-card">
                        <div class="result-icon correct">&#10004;</div>
                        <div class="result-value" id="correctCount">0</div>
                        <div class="result-label">Correctas</div>
                    </div>
                    <div class="result-card">
                        <div class="result-icon wrong">&#10008;</div>
                        <div class="result-value" id="wrongCount">0</div>
                        <div class="result-label">Incorrectas</div>
                    </div>
                    <div class="result-card">
                        <div class="result-icon score">&#9733;</div>
                        <div class="result-value" id="scorePercent">0%</div>
                        <div class="result-label">Puntuaci&#243;n</div>
                    </div>
                    <div class="result-card">
                        <div class="result-icon time">&#9889;</div>
                        <div class="result-value" id="timeBonus">0</div>
                        <div class="result-label">Bonus tiempo</div>
                    </div>
                    <div class="result-card">
                        <div class="result-icon final">&#127942;</div>
                        <div class="result-value" id="totalScore">0</div>
                        <div class="result-label">Puntuaci&#243;n total</div>
                    </div>
                </div>

                <div id="statsSection"></div>
                <div id="questionsReview"></div>

                <div class="results-actions">
                    <button id="saveScoreBtn" class="btn btn-primary">Guardar Marcador</button>
                    <button id="playAgainBtn" class="btn btn-secondary">Jugar de Nuevo</button>
                    <button id="goToLeaderboardBtn" class="btn btn-secondary">Ver Marcadores</button>
                </div>
            </section>

            <section id="leaderboardScreen" class="screen">
                <h2>&#127942; Marcadores</h2>
                <div id="leaderboardList"></div>
                <button id="clearLeaderboardBtn" class="btn btn-danger" style="display: none;">Borrar Marcadores</button>
                <button id="backToConfigBtn" class="btn btn-secondary">Volver</button>
            </section>
        </main>

        <div id="confettiContainer"></div>

        <div class="modal-overlay" id="modalOverlay" style="display: none;">
            <div class="modal">
                <p id="modalMessage"></p>
                <button id="modalOkBtn" class="btn btn-primary">OK</button>
            </div>
        </div>
    </div>

    <script src="game.js"></script>
    <script src="leaderboard.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
